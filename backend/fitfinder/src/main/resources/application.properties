spring.application.name=FitFinder
server.port=7860
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.web.socket=TRACE
logging.level.org.apache.tomcat.websocket=DEBUG
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
security.jwt.access-expiration-time=${SECURITY_JWT_ACCESS_EXPIRATION_TIME}
security.jwt.refresh-expiration-time=${SECURITY_JWT_REFRESH_EXPIRATION_TIME}
cloudinary.url=${CLOUDINARY_URL}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
forwarding.url=${FORWARDING_URL}
# Tell Spring to trust the headers sent by the ngrok proxy
server.forward-headers-strategy=framework
# Optional: If you encounter issues with the host specifically
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
