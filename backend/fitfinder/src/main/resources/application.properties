spring.application.name=FitFinder
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
security.jwt.access-expiration-time=${SECURITY_JWT_ACCESS_EXPIRATION_TIME}
security.jwt.refresh-expiration-time=${SECURITY_JWT_REFRESH_EXPIRATION_TIME}
server.port=8081
